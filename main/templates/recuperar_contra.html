{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión - Dofit</title>
    <link rel="stylesheet" href="{% static 'css/style.min.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>
<body>
    <div class="d-flex align-items-center justify-content-center min-vh-100">
        <div class="card text-center">
            <div class="card-header">
                Encontrar tu cuenta
            </div>
            <div class="card-body">
              <p class="card-text">Por favor ingresa el nombre de usuario o numero de telefono.</p>
              <div class="row g-3 align-items-center">
                <div class="col-auto">
                  <input type="password" id="inputPassword6" class="form-control" aria-describedby="passwordHelpInline" placeholder="Usuario o numero de telefono">
                </div>
              </div>
            </div>
            <div class="card-footer text-body-secondary">
              <button>Cancelar</button>
              <button>Buscar</button>
            </div>
          </div>
    </div>
    
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
