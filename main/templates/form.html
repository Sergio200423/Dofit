<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión Dofit</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="{% static 'img/svg/gym2' %}" type="image/x-icon">
    <!-- Custom styles -->
    <link rel="stylesheet" href="{% static 'css/style.min.css' %}">
</head>
<body>
    <div class="layer"></div>
    <main class="page-center">
        <article class="sign-up">
            <h1 class="sign-up__title">¡Bienvenido!</h1>
            <p class="sign-up__subtitle">Inicia sesión para continuar</p>
            <form class="sign-up-form form" action="{% url 'signin' %}" method="POST">
                {% csrf_token %}
                <label class="form-label-wrapper">
                    <p class="form-label">Usuario</p>
                    <input class="form-input" type="text" name="username" placeholder="Ingresa tu usuario" required>
                </label>
                <label class="form-label-wrapper">
                    <p class="form-label">Contraseña</p>
                    <input class="form-input" type="password" name="password" placeholder="Ingresa tu contraseña" required>
                </label>
                <a class="link-info forget-link" href="{% url 'signup' %}">¿Olvidaste tu contraseña?</a>
                <label class="form-checkbox-wrapper">
                    <input class="form-checkbox" type="checkbox" required>
                    <span class="form-checkbox-label">Recordarme la próxima vez</span>
                </label>
                <button class="form-btn primary-default-btn transparent-btn">Ingresar</button>
            </form>
        </article>
    </main>
    <!-- Chart library -->
    <script src="{% static 'plugins/chart.min.js' %}"></script>
    <!-- Icons library -->
    <script src="{% static 'plugins/feather.min.js' %}"></script>
    <!-- Custom scripts -->
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
