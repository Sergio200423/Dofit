<div class="modal fade" id="testModal" tabindex="-1" aria-labelledby="testModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title" id="testModalLabel">Registro de Clientes</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="registroCliente" action="{% url 'clientes' %}" method="POST">
            {% csrf_token %}
            <div id="alert-message" style="display: none; color: red; margin-bottom: 10px;"></div>
  
            <!-- Nombre -->
            <div class="mb-3">
              <label for="nombre" class="form-label">Nombre</label>
              <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ingresa el nombre" required>
            </div>
  
            <!-- Sexo -->
            <div class="mb-3">
              <label for="sexo" class="form-label">Sexo</label>
              <select class="form-select" id="sexo" name="sexo" required>
                <option value="">Seleccione una opción</option>
                <option value="Masculino">Masculino</option>
                <option value="Femenino">Femenino</option>
              </select>
            </div>
  
            <!-- Fecha de Nacimiento -->
            <div class="mb-3">
              <label for="fecha_nacimiento" class="form-label">Fecha de Nacimiento</label>
              <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento" required>
            </div>
  
            <!-- Membresía -->
            <div class="mb-3">
              <label for="membresia" class="form-label">Membresía</label>
              <select class="form-select" id="membresia" name="membresia">
                {% for membresia in membresias %}
                <option value="{{ membresia.nombre }}">{{ membresia.nombre }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="modal-footer">
              <button type="submit" class="btn btn-primary" data-bs-dismiss="modal">Registrar</button>
            </div>
          </form>
        </div>
        
      </div>
    </div>
  </div>
