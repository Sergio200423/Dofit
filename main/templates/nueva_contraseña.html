<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña</title>
    <!-- Favicon -->
    <link rel="shortcut icon" href="{% static 'img/svg/gym2' %}" type="image/x-icon">
    <!-- Custom styles -->
    <link rel="stylesheet" href="{% static 'css/style.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/recuperarContra.css' %}">
</head>
<body style="background: #fff;">
    <div class="layer"></div>
    <div class="page-wrapper">
        <main class="page-content">
            <div class="card">
                <div class="card-header">
                    <h1 class="card-title">Nueva contraseña</h1>
                </div>
                <div class="card-body">
                    {% if error_contra_igual %}
                        <div id="alert-message" style="display:block; background-color:rgba(239,68,68,0.1); color:var(--danger-color); border:1px solid var(--danger-color); border-radius:0.375rem; padding:0.75rem 1rem; margin-bottom:1rem; font-weight:500;">
                            <i class="fas fa-exclamation-triangle" style="margin-right:8px;"></i>
                            La nueva contraseña no puede ser igual a la actual.
                        </div>
                    {% endif %}
                    <form class="sign-up-form form" action="{% url 'nueva_contraseña' %}" method="POST">
                    {% csrf_token %}
                        <label class="form-label-wrapper">
                            <p class="form-label">Nueva contraseña</p>
                            <input class="form-input" type="password" placeholder="Ingresa tu nueva contraseña" required name="contraseña">
                            <p class="sign-up__subtitle" style="text-align: left; font-size: small;">Tiene que tener al menos 8 caracteres</p>
                            <p class="form-label">Confirma tu contraseña</p>
                            <input class="form-input" type="password" placeholder="Ingresa de nuevo tu contraseña" required name="confirmar_contraseña"> 
                            <p class="sign-up__subtitle" style="text-align: left; font-size: small;">Ambas contraseñas deben de ser iguales</p>
                        </label>
                        <button type="submit" class="form-btn primary-default-btn transparent-btn">Cambiar contraseña</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <!-- Chart library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <!-- Icons library -->
    <script src="https://cdn.jsdelivr.net/npm/feather-icons@4.29.0/dist/feather.min.js"></script>
    <!-- Custom scripts -->
    <script src="{% static 'js/script.js' %}"></script>
    <script>
    // Al cambiar la contraseña, resetea los intentos de login
    document.addEventListener('DOMContentLoaded', function() {
        localStorage.setItem('loginAttempts', '0');
    });
    </script>
</body>
</html>
