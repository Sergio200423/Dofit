<div class="modal fade" id="testModal" tabindex="-1" aria-labelledby="testModalLabel" aria-hidden="true">
  <div class="modal-dialog">
      <div class="modal-content">
          <div class="modal-header">
              <h1 class="modal-title" id="testModalLabel">Añadir Producto</h1>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="login-form card">
              <div class="modal-body">
                  <form id="add-product-form" action="{% url 'registro_productos' %}" method="POST">
                      {% csrf_token %}
                      <div id="alert-message" style="display: none; color: red; margin-bottom: 10px;"></div>

                      <label>
                          <p>Nombre del producto</p>
                            <input type="text" name="nombre_  producto" placeholder="Ingresa el nombre" required>
                      </label>  
                      
                      <label>
                          <p>Descripción</p>
                          <textarea name="descripcion" placeholder="Especificaciones" rows="3" required></textarea>
                      </label>

                      <label>
                          <p>Precio Unitario</p>
                          <input type="number" name="precio" placeholder="Precio en córdobas" required>
                      </label>

                      <label>
                          <p>Cantidad</p>
                          <input type="number" name="cantidad" placeholder="Cantidad en stock" required>
                      </label>

                      <div style="display: flex; justify-content: center; width: 100%;">
                          <button id="submit" style="padding: 10px 20px;">Guardar Producto</button>
                      </div>                  
                  </form>
              </div>
          </div>
          <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          </div>
      </div>
  </div>
</div>

<style>
  * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
  }
  .login-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
      padding: 1.5rem;
  }
  .login-container {
      display: flex;
      max-width: 1000px;
      width: 95%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 5px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
  }
  .card {
      padding: 2.2rem;
      flex: 1;
  }
  .login-form {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
  }
  .login-form p {
      margin-bottom: 0.5rem;
      font-weight: bold;
      color: #333;
  }
  .login-form form {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
  }
  .login-form label {
      margin-bottom: 1rem;
      width: 100%;
  }
  .login-form input, .login-form textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
  }
  .login-form button {
      background: #2575fc;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
  }
  .login-form button:hover {
      background: #6a11cb;
  }
</style>
