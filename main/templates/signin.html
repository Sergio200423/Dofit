{% load static %}
{% if messages %}
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            {% for message in messages %}
                {% if message != "¡Nos vemos pronto!" %}
                    Swal.fire({
                        icon: "success",
                        title: "Cierre de sesion exitoso",
                        text: "{{ message|escapejs }}",
                        confirmButtonText: "OK"
                    });
                {% endif %}
            {% endfor %}
        });
    </script>
{% endif %}

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión - Dofit</title>
    <link rel="stylesheet" href="{% static 'css/style.min.css' %}">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-container">
            <div class="login-image card">
                <img src="{% static 'img/dofit.jpg' %}" alt="Login Image">
            </div>
            <div class="login-form card">
                <h1>¡Bienvenido!</h1>
                <p>Inicia sesión para continuar</p>
                <form id="login" action="{% url 'signin' %}" method="POST">
                    {% csrf_token %}
                    <div id="alert-message" style="display: none; color: red; margin-bottom: 10px;"></div>
                    <label>
                        <p>Usuario</p>
                        <input type="text" name="username" placeholder="Ingresa tu usuario" required>
                    </label>
                    <label>
                        <p>Contraseña</p>
                        <input type="password" name="password" placeholder="Ingresa tu contraseña" required>
                    <!-- Separar "¿Olvidaste tu contraseña?" -->
                    <div style="text-align: left; width: 100%; margin-bottom: 1rem;">
                        <a href="{% url 'recuperar_contraseña' %}" style="text-align: left;"><br>¿Olvidaste tu contraseña?</a>
                    </div>

                     <!--
                    <div>
                        <input type="checkbox" id="rememberMe" style="display: flex; align-items: center; gap: 8px; justify-content: flex-start;">
                        <label for="rememberMe" style="margin: 0;" style="display: flex; align-items: center; gap: 8px; justify-content: flex-start;">Recordarme la próxima vez</label>
                    </div>
                    -->
                    <div style="display: flex; justify-content: center; width: 100%;">
                        <button id="submit" style="padding: 10px 20px; margin-right: 20px; ;">Ingresar</button>
                    </div>
                                        
                </form>
            </div>
        </div>
    </div>

        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: Arial, sans-serif;
            }
            .login-wrapper {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                background: #f5f5f5;
                padding: 1.5rem;
            }
            .login-container {
                display: flex;
                max-width: 1000px;
                width: 95%;
                background: #fff;
                border-radius: 12px;
                box-shadow: 0 5px 8px rgba(0, 0, 0, 0.1);
                overflow: hidden;
            }
            .card {
                padding: 2.2rem;
                flex: 1;
            }
            .login-image {
                display: flex;
                justify-content: center;
                align-items: center;
                background: #e0e0e0;
            }
            .login-image img {
                width: 100%;
                max-width: 400px;
            }
            .login-form {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            .login-form h1 {
                margin-bottom: 1.2rem;
            }
            .login-form p {
                margin-bottom: 1.8rem;
                color: #555;
            }
            .login-form form {
                width: 100%;
                max-width: 350px;
                display: flex;
                flex-direction: column;
            }
            .login-form label {
                margin-bottom: 1.2rem;
                width: 100%;
            }
            .login-form input {
                width: 100%;
                padding: 12px;
                border: 1px solid #ccc;
                border-radius: 6px;
            }
            .login-form a {
                text-align: right;
                display: block;
                margin-bottom: 1.2rem;
                color: #2575fc;
                text-decoration: none;
            }
            .login-form button {
                background: #2575fc;
                color: #fff;
                border: none;
                padding: 12px;
                border-radius: 6px;
                cursor: pointer;
                transition: background 0.3s;
            }
            .login-form button:hover {
                background: #6a11cb;
            }
        </style>

<!-- Incluir librería de SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>




</body>
    
</html>
